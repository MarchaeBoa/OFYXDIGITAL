<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfyxDigital — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
:root {
  /* Brand */
  --brand:        #F5620F;
  --brand-light:  #FF7A33;
  --brand-dark:   #C74D0A;
  --brand-dim:    rgba(245,98,15,.10);
  --brand-glow:   rgba(245,98,15,.20);
  --brand-border: rgba(245,98,15,.25);

  /* Neutral surfaces — deep space */
  --surface-0: #040407;
  --surface-1: #08080D;
  --surface-2: #0C0C14;
  --surface-3: #111119;
  --surface-4: #17171F;
  --surface-5: #1E1E28;
  --surface-6: #252532;

  /* Borders */
  --border-0: rgba(255,255,255,.045);
  --border-1: rgba(255,255,255,.08);
  --border-2: rgba(255,255,255,.13);
  --border-3: rgba(255,255,255,.20);

  /* Text */
  --text-primary:   #EEEEF2;
  --text-secondary: #8888A0;
  --text-tertiary:  #4A4A62;
  --text-quaternary:#2A2A3C;

  /* Semantic */
  --green:   #0FCC74;
  --blue:    #4F8EF7;
  --purple:  #9B6FFF;
  --yellow:  #F5A623;
  --red:     #FF4D5E;

  /* Typography */
  --font-display: 'Bricolage Grotesque', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --font-mono:    'SF Mono', 'Fira Code', monospace;

  /* Spacing — 4px base grid */
  --sp-1:  4px;  --sp-2:  8px;  --sp-3:  12px; --sp-4:  16px;
  --sp-5:  20px; --sp-6:  24px; --sp-7:  32px; --sp-8:  40px;
  --sp-9:  48px; --sp-10: 64px; --sp-11: 80px; --sp-12: 96px;
  --sp-13: 128px;

  /* Border radius */
  --radius-xs: 4px; --radius-sm: 6px; --radius-md: 10px;
  --radius-lg: 14px; --radius-xl: 20px; --radius-2xl: 28px;
  --radius-full: 9999px;

  /* Shadows */
  --shadow-sm:   0 1px 3px rgba(0,0,0,.5), 0 1px 2px rgba(0,0,0,.4);
  --shadow-md:   0 4px 16px rgba(0,0,0,.55), 0 1px 4px rgba(0,0,0,.4);
  --shadow-lg:   0 8px 40px rgba(0,0,0,.65), 0 2px 8px rgba(0,0,0,.5);
  --shadow-xl:   0 20px 80px rgba(0,0,0,.75), 0 4px 20px rgba(0,0,0,.55);
  --shadow-screen: 0 40px 120px rgba(0,0,0,.85), 0 8px 40px rgba(0,0,0,.6),
                   inset 0 1px 0 rgba(255,255,255,.06),
                   0 0 0 1px rgba(255,255,255,.06);
  --shadow-brand: 0 0 50px rgba(245,98,15,.22), 0 8px 32px rgba(245,98,15,.15);
  --shadow-inset-top: inset 0 1px 0 rgba(255,255,255,.07);

  /* Transitions */
  --ease-out: cubic-bezier(.16,1,.3,1);
  --ease-in-out: cubic-bezier(.4,0,.2,1);
  --t-fast: .15s;
  --t-med:  .25s;
  --t-slow: .4s;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Bricolage Grotesque', sans-serif;
  background: var(--surface-0);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ── Page layout ─────────────────────────────────── */
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
}

/* Subtle background grid */
.auth-page::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(245,98,15,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,98,15,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Glow blob */
.auth-page::after {
  content: '';
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,98,15,.07) 0%, transparent 70%);
  top: -100px; left: 50%; transform: translateX(-50%);
  pointer-events: none;
}

.auth-wrap {
  width: 100%; max-width: 420px;
  position: relative; z-index: 1;
}

/* ── Back link ────────────────────────────────────── */
.auth-back {
  display: inline-flex; align-items: center; gap: 7px;
  color: var(--text-tertiary); font-size: .82rem; text-decoration: none;
  margin-bottom: 24px; transition: color .15s;
}
.auth-back:hover { color: var(--text-secondary); }
.auth-back svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

/* ── Card ─────────────────────────────────────────── */
.auth-box {
  background: var(--surface-1);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 18px;
  padding: 32px;
  box-shadow: 0 32px 80px rgba(0,0,0,.5);
}

/* ── Logo ─────────────────────────────────────────── */
.auth-logo {
  display: flex; align-items: center; gap: 9px;
  margin-bottom: 26px;
}
.auth-logo-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--brand);
  display: flex; align-items: center; justify-content: center;
  font-size: .68rem; font-weight: 900; color: #fff; flex-shrink: 0;
}
.auth-logo-text {
  font-size: .95rem; font-weight: 800; letter-spacing: -.3px;
  color: var(--text-primary);
}
.auth-logo-text span { color: var(--brand); }

/* ── Tabs ─────────────────────────────────────────── */
.auth-tabs {
  display: flex; gap: 4px;
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 10px; padding: 4px;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1; padding: 8px;
  border: none; border-radius: 7px;
  background: none; color: var(--text-tertiary);
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: .82rem; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.auth-tab.active {
  background: var(--surface-4);
  color: var(--text-primary);
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}

/* ── Form fields ─────────────────────────────────── */
.auth-field { margin-bottom: 14px; }
.auth-field label {
  display: block;
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--text-tertiary); margin-bottom: 7px;
}
.auth-field input {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 9px; padding: 11px 14px;
  color: var(--text-primary);
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: .9rem; outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.auth-field input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(245,98,15,.12);
}
.auth-field input::placeholder { color: var(--text-quaternary, #36364A); }

/* ── Submit button ───────────────────────────────── */
.auth-submit {
  width: 100%; padding: 12px;
  border: none; border-radius: 9px; cursor: pointer;
  background: var(--brand); color: #fff;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: .9rem; font-weight: 700;
  transition: background .15s; margin-top: 4px;
}
.auth-submit:hover { background: var(--brand-dark); }

/* ── Loading state ───────────────────────────────── */
.auth-loading {
  display: none; align-items: center; justify-content: center;
  gap: 10px; padding: 12px;
  color: var(--text-tertiary); font-size: .84rem;
  margin-top: 4px;
}
.auth-spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.1);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error message ───────────────────────────────── */
.auth-error {
  font-size: .8rem; color: #FF6B6B;
  background: rgba(255,77,77,.08);
  border: 1px solid rgba(255,77,77,.2);
  border-radius: 8px; padding: 10px 14px;
  margin-top: 12px; display: none;
}
.auth-error.show { display: block; }

/* ── Switch link ─────────────────────────────────── */
.auth-switch {
  text-align: center; margin-top: 18px;
  font-size: .82rem; color: var(--text-tertiary);
}
.auth-switch a {
  color: var(--brand); cursor: pointer; text-decoration: none; font-weight: 600;
}
.auth-switch a:hover { text-decoration: underline; }

/* ── Divider ─────────────────────────────────────── */
.auth-divider {
  display: flex; align-items: center; gap: 12px; margin: 18px 0;
}
.auth-divider::before,
.auth-divider::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(255,255,255,.06);
}
.auth-divider span { font-size: .72rem; color: var(--text-quaternary, #36364A); }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-wrap">

    <a href="/" class="auth-back">
      <svg viewBox="0 0 14 14"><path d="M9 1L3 7l6 6"/></svg>
      Voltar para o início
    </a>

    <div class="auth-box">
      <div class="auth-logo">
        <div class="auth-logo-icon">OD</div>
        <div class="auth-logo-text">Ofyx<span>Digital</span></div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchAuthTab('login')">Entrar</button>
        <button class="auth-tab"        id="tab-register" onclick="switchAuthTab('register')">Criar conta</button>
      </div>

      <!-- ── Login ── -->
      <div id="form-login">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Senha</label>
          <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="auth-submit" id="btn-login-submit" onclick="doLoginPage()">Entrar na conta</button>
        <div class="auth-loading" id="login-loading">
          <div class="auth-spinner"></div> Verificando...
        </div>
        <div class="auth-error" id="login-error"></div>
        <div class="auth-switch">Não tem conta? <a onclick="switchAuthTab('register')">Criar conta grátis</a></div>
      </div>

      <!-- ── Register ── -->
      <div id="form-register" style="display:none">
        <div class="auth-field">
          <label>Nome completo</label>
          <input type="text" id="reg-nome" placeholder="Seu nome" autocomplete="name">
        </div>
        <div class="auth-field">
          <label>Empresa <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-quaternary,#36364A)">(opcional)</span></label>
          <input type="text" id="reg-empresa" placeholder="Nome da empresa">
        </div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Senha</label>
          <input type="password" id="reg-senha" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
        </div>
        <button class="auth-submit" id="btn-register-submit" onclick="doRegisterPage()">Criar minha conta</button>
        <div class="auth-loading" id="register-loading">
          <div class="auth-spinner"></div> Criando conta...
        </div>
        <div class="auth-error" id="register-error"></div>
        <div class="auth-switch">Já tem conta? <a onclick="switchAuthTab('login')">Entrar</a></div>
      </div>

    </div>
  </div>
</div>

<script>
const SESSION_KEY = 'ofyx_session';
const USERS_KEY   = 'ofyx_users';

function _getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); } catch { return null; } }
function _setSession(u) { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
function _getUsers()    { try { return JSON.parse(localStorage.getItem(USERS_KEY)||'[]');  } catch { return []; } }
function _setUsers(u)   { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

// Se já logado → dashboard direto
if (_getSession()) window.location.replace('/dashboard.html');

// ── UI helpers ─────────────────────────────────────────
function clearAuthErrors() {
  ['login-error','register-error'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('show'); el.textContent = ''; }
  });
}
function showAuthError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.classList.add('show'); }
}
function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab !== 'login');
  document.getElementById('form-login').style.display    = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab !== 'login' ? 'block' : 'none';
  clearAuthErrors();
}
function setAuthLoading(prefix, on) {
  const btn     = document.getElementById('btn-' + prefix + '-submit');
  const loading = document.getElementById(prefix + '-loading');
  if (btn)     btn.style.display = on ? 'none' : '';
  if (loading) loading.style.display = on ? 'flex' : 'none';
}

// ── Seed admin ─────────────────────────────────────────
function seedAdminUser() {
  const ADMIN_EMAIL = 'oescolhidoneo9@gmail.com';
  const users = _getUsers();
  const exists = users.find(u => (u.email||'').toLowerCase() === ADMIN_EMAIL.toLowerCase());
  if (!exists) {
    users.unshift({
      id: 'admin-fixed',
      nome: 'Administrador Master',
      email: ADMIN_EMAIL,
      initials: 'AM',
      role: 'admin',
      plano: 'enterprise',
      accountStatus: 'ativo',
      senha: 'ofyx@admin2026',
      createdAt: '2025-01-01T00:00:00',
      lastAccess: new Date().toISOString(),
      obs: 'Conta administrativa fixa.',
    });
    _setUsers(users);
  } else {
    // Always enforce admin properties
    exists.role = 'admin';
    exists.plano = 'enterprise';
    exists.accountStatus = 'ativo';
    _setUsers(users);
  }
}
seedAdminUser();

// ── Login ──────────────────────────────────────────────
function doLoginPage() {
  const email = (document.getElementById('login-email').value || '').trim();
  const senha =  document.getElementById('login-senha').value || '';
  clearAuthErrors();
  if (!email) { showAuthError('login-error', 'Informe seu email.'); return; }
  if (!senha) { showAuthError('login-error', 'Informe sua senha.'); return; }
  setAuthLoading('login', true);

  // Try API first, fallback to localStorage
  (async () => {
    try {
      const res = await fetch('/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha }),
      });
      if (res.ok) {
        const data = await res.json();
        _setSession(data.user);
        window.location.href = '/dashboard.html';
        return;
      }
      const data = await res.json().catch(() => ({}));
      if (data.code === 'EMAIL_NOT_VERIFIED') {
        window.location.href = '/verify-pending.html?email=' + encodeURIComponent(email);
        return;
      }
      if (res.status !== 404) {
        setAuthLoading('login', false);
        showAuthError('login-error', data.error || 'Email ou senha incorretos.');
        return;
      }
    } catch {}
    // localStorage fallback
    const user = _getUsers().find(u => u.email.toLowerCase() === email.toLowerCase() && u.senha === senha);
    if (!user) {
      setAuthLoading('login', false);
      showAuthError('login-error', 'Email ou senha incorretos.');
      return;
    }
    if (user.accountStatus && user.accountStatus !== 'ativo') {
      setAuthLoading('login', false);
      showAuthError('login-error', 'Conta suspensa. Entre em contato com o suporte.');
      return;
    }
    _setSession(user);
    window.location.href = '/dashboard.html';
  })();
}


// ── Register ───────────────────────────────────────────
function doRegisterPage() {
  const nome    = (document.getElementById('reg-nome').value    || '').trim();
  const empresa = (document.getElementById('reg-empresa').value || '').trim();
  const email   = (document.getElementById('reg-email').value   || '').trim();
  const senha   =  document.getElementById('reg-senha').value   || '';
  clearAuthErrors();
  if (!nome)  { showAuthError('register-error', 'Informe seu nome completo.'); return; }
  if (!email) { showAuthError('register-error', 'Informe seu email.'); return; }
  if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) { showAuthError('register-error', 'Email inválido.'); return; }
  if (senha.length < 8) { showAuthError('register-error', 'Senha deve ter no mínimo 8 caracteres.'); return; }
  setAuthLoading('register', true);

  (async () => {
    try {
      const res = await fetch('/api/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, empresa, email, senha }),
      });
      if (res.ok) {
                window.location.href = '/verify-pending.html?email=' + encodeURIComponent(email);
        return;
      }
      const data = await res.json().catch(() => ({}));
      if (res.status !== 404) {
        setAuthLoading('register', false);
        showAuthError('register-error', data.error || 'Erro ao criar conta.');
        return;
      }
    } catch {}
    // localStorage fallback
    const users = _getUsers();
    if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
      setAuthLoading('register', false);
      showAuthError('register-error', 'Este email já está cadastrado.');
      return;
    }
    const initials = nome.trim().split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
    const newUser = {
      id: crypto.randomUUID(), nome, empresa: empresa || 'Minha Empresa',
      email: email.toLowerCase(), senha, initials,
      role: 'Operador', plano: 'basic', accountStatus: 'ativo',
      createdAt: new Date().toISOString(),
    };
    users.push(newUser);
    _setUsers(users);
    _setSession(newUser);
    window.location.href = '/dashboard.html';
  })();
}


// Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVisible = document.getElementById('form-login').style.display !== 'none';
  if (loginVisible) doLoginPage(); else doRegisterPage();
});

// ?tab= URL param
const urlTab = new URLSearchParams(window.location.search).get('tab');
if (urlTab === 'register') switchAuthTab('register');
</script>
</body>
</html>
